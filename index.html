<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RGI Executive Dinner – Check-in</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-root:        #05050e;
      --bg-card:        #0e1420;
      --bg-card-hover:  #141d2e;
      --border:         #1a2640;
      --border-hover:   rgba(43, 172, 226, 0.35);
      --text-primary:   #dde6f0;
      --text-secondary: #7a91b0;
      --text-muted:     #3d5066;
      --accent:         #2bace2;
      --accent-dim:     rgba(43, 172, 226, 0.12);
      --accent-glow:    rgba(43, 172, 226, 0.07);
      --toggle-track:   #1e2d42;
      --toggle-thumb:   #3d5066;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--bg-root);
      color: var(--text-primary);
      min-height: 100vh;
      padding-bottom: 3rem;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────────────────── */

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(180deg, #080c18 0%, #0a1020 100%);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.6);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.875rem 1.25rem;
      max-width: 920px;
      margin: 0 auto;
    }

    .header-brand {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .header-logo svg {
      height: 28px;
      width: auto;
      display: block;
    }

    .header-title {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ffffff;
    }

    .counter-badge {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--accent-dim);
      border: 1px solid rgba(43, 172, 226, 0.25);
      padding: 0.5rem 1.1rem;
      border-radius: 999px;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .counter-badge strong {
      color: var(--accent);
      font-weight: 700;
      font-size: 1.15rem;
    }

    /* ── Main ────────────────────────────────────────────────── */

    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 1.25rem 1rem 0;
    }

    /* ── List ────────────────────────────────────────────────── */

    .participants-list {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    /* ── Card ────────────────────────────────────────────────── */

    .participant-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.1rem;
      transition: background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .participant-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      box-shadow: 0 0 0 1px var(--accent-glow), 0 6px 28px rgba(0, 0, 0, 0.45);
    }

    /* ── Avatar ──────────────────────────────────────────────── */

    .avatar {
      flex-shrink: 0;
      position: relative;
      width: 88px;
      height: 88px;
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a5fa8, var(--accent));
      z-index: 0;
      opacity: 0.55;
    }

    .avatar img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: var(--bg-root);
    }

    /* ── Info ────────────────────────────────────────────────── */

    .participant-info {
      flex: 1;
      min-width: 0;
    }

    .participant-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.25;
      margin-bottom: 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .participant-company {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.01em;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .participant-role {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    /* ── Toggle ──────────────────────────────────────────────── */

    .toggle-wrapper {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .toggle-label {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .toggle-switch {
      position: relative;
      width: 46px;
      height: 26px;
      cursor: default;
      user-select: none;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--toggle-track);
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .toggle-thumb {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--toggle-thumb);
    }

    /* ── Responsive – Desktop ────────────────────────────────── */

    @media (min-width: 600px) {
      .header-inner {
        padding: 1rem 1.5rem;
      }

      .header-logo svg {
        height: 34px;
      }

      .header-title {
        font-size: 0.78rem;
      }

      .counter-badge {
        font-size: 1.1rem;
        padding: 0.55rem 1.3rem;
      }

      .counter-badge strong {
        font-size: 1.25rem;
      }

      main {
        padding: 1.5rem 1.5rem 0;
      }

      .participant-card {
        padding: 1.1rem 1.4rem;
        gap: 1.25rem;
      }

      .avatar {
        width: 108px;
        height: 108px;
      }

      .participant-name {
        font-size: 1.15rem;
        margin-bottom: 0.35rem;
      }

      .participant-company {
        font-size: 1rem;
        margin-bottom: 0.3rem;
      }

      .participant-role {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-brand">
        <div class="header-logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 118.9">
            <defs>
              <style>.st0{fill:#fff}.st2{fill:#2bace2}</style>
            </defs>
            <path class="st0" d="M221.8,111.5V8.4h19.8v103.1h-19.8Z"/>
            <path class="st0" d="M102.2,67.4c3.2-1.2,6.3-3,9.1-5.4,2.9-2.4,4.9-5.4,6.6-9,1.9-3.6,2.9-7.8,2.9-12.5s-1.4-11-4.2-15.7c-2.5-4.7-6.3-8.5-11.3-11.3-4.9-2.9-13.3-4.8-20.3-5H7.9l9.2,18.8h69.2c4.4,0,8.3,1.4,10.8,3.7,2.5,2.5,3.7,5.9,3.7,9.8s-1.4,7.3-3.7,9.6c-2.5,2.5-6.3,3.7-10.8,3.7h-29.6l8.3,16.7h16.9l21.2,40.6h22l-22.8-44.1h-.1Z"/>
            <path class="st2" d="M38.7,53.1c-2.6-2.6-5.6-3.7-9.1-3.7s-6.5,1.2-9.1,3.7c-2.6,2.6-3.7,5.6-3.7,9.3s1.2,6.5,3.7,9.3c2.6,2.6,5.6,3.7,9.1,3.7s6.5-1.2,9.1-3.7c2.6-2.6,3.7-5.6,3.7-9.3s-1.2-6.5-3.7-9.3"/>
            <path class="st0" d="M158.3,30.7c3.1-3.2,7.3-4.8,12.5-4.8s9.2,1.5,12.2,4.5c3,2.9,4.5,6.5,4.6,10.6h20.3c0-6.1-1.6-11.6-4.7-16.5-3.1-4.9-7.5-8.9-13.1-11.7-5.6-2.9-12.1-4.3-19.4-4.3s-13.9,1.5-19.6,4.4c-5.7,2.9-10.1,7.1-13.2,12.5-3.1,5.4-4.7,11.6-4.7,18.6v32.3c0,7,1.6,13.2,4.7,18.5,3.1,5.3,7.5,9.5,13.2,12.5s12.2,4.5,19.6,4.5,13.9-1.4,19.5-4.2c5.6-2.8,10-6.9,13-12.3,3.1-5.4,4.6-11.7,4.6-19v-22h-36.7v16.5h16.8v8.6c0,4.7-1.5,8.4-4.5,11s-7,4-12,4-9.5-1.6-12.8-4.8c-3.4-3.2-5-7.4-5-12.6v-33.4c0-5.2,1.6-9.4,4.7-12.6v-.3Z"/>
          </svg>
        </div>
        <div class="header-title">Executive Dinner</div>
      </div>
      <div class="counter-badge">Presenti:&nbsp;<strong>0</strong>&nbsp;/ 21</div>
    </div>
  </header>

  <main>
    <div class="participants-list" id="participantsList"></div>
  </main>

  <script>
    const participants = [
      { id: 1,  firstName: 'Danilo',          lastName: 'Ughetto',    company: 'Assimoco',               role: 'Direttore ICT' },
      { id: 2,  firstName: 'Claudia',         lastName: 'Ferraguti',  company: 'Credemassicurazioni',    role: 'Direttore generale' },
      { id: 3,  firstName: 'Tarek',           lastName: 'Ghaddar',    company: 'HDI Assicurazioni',      role: 'Chief Information Officer' },
      { id: 4,  firstName: 'Luca',            lastName: 'Lanzoni',    company: 'HDI Assicurazioni',      role: 'General Manager / COO' },
      { id: 5,  firstName: 'Maurizio',        lastName: 'Sala',       company: 'Helvetia',               role: 'Head IT Application Service Management' },
      { id: 6,  firstName: 'Andrea',          lastName: 'Amadei',     company: 'Intesa Assicurazioni',   role: 'Chief Operating Officer' },
      { id: 7,  firstName: 'Ciro',            lastName: 'Calzolaio',  company: 'Intesa Assicurazioni',   role: 'Responsabile Sistemi Informativi Danni' },
      { id: 8,  firstName: 'Vito',            lastName: 'Capezzera',  company: 'Mediolanum Assicurazioni', role: 'Responsabile Operations Protezione, Mediolanum Assicurazioni e Mediolanum Vita' },
      { id: 9,  firstName: 'Laura',           lastName: 'Baiano',     company: 'Mediolanum Assicurazioni', role: 'Chief Application Officer' },
      { id: 10, firstName: 'Stefano',         lastName: 'Berni',      company: 'Unipol Assicurazioni',   role: 'Responsabile IT' },
      { id: 11, firstName: 'Marco',           lastName: 'Bellea',     company: 'Unicredit',              role: 'Head of Client & Insurance Solutions' },
      { id: 12, firstName: 'Enzo Alessandro', lastName: 'Di Puma',    company: 'AXA Italia',             role: 'Chief Operating Officer' },
      { id: 13, firstName: 'Assunta',         lastName: 'Carbonara',  company: 'Amtrust',                role: 'Head of Technology & System Development' },
      { id: 14, firstName: 'Thomas',          lastName: 'Lausdat',    company: 'Groupama',               role: 'Direttore Vita e Linea Persone' },
      { id: 15, firstName: 'Marco',           lastName: 'Barioni',    company: 'Reale Group',            role: 'Group Chief Information Technology Officer' },
      { id: 16, firstName: 'Marco',           lastName: 'di Guida',   company: 'Credit Agricole',        role: 'CEO' },
      { id: 17, firstName: 'Andrea',          lastName: 'Brusa',      company: 'Reale Mutua',            role: 'Chief Software Development Officer' },
      { id: 18, firstName: 'Umberto',         lastName: 'Costanzini', company: 'Generali',               role: 'CEO Generali Core Tech' },
      { id: 19, firstName: 'Paolo',           lastName: 'Calvi',      company: 'Credemvita',             role: 'Team Leader Products and Operation' },
      { id: 20, firstName: 'Paola',           lastName: 'Invidia',    company: 'CNP Assurances SA',      role: 'Country General Manager' },
      { id: 21, firstName: 'Giorgio',         lastName: 'Maccagni',   company: 'CNP Assurances SA',      role: 'Responsabile Organizzazione, IT/PMO, Acquisti e Servizi Generali' },
    ];

    function getImagePath(lastName) {
      const normalized = lastName
        .toLowerCase()
        .normalize('NFD')
        .replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z]/g, '');
      return `/img/${normalized}.jpg`;
    }

    function renderParticipants() {
      const list = document.getElementById('participantsList');

      participants.forEach(p => {
        const imgSrc = getImagePath(p.lastName);

        const card = document.createElement('div');
        card.className = 'participant-card';
        card.dataset.id = p.id;

        card.innerHTML = `
          <div class="avatar">
            <img
              src="${imgSrc}"
              alt="${p.firstName} ${p.lastName}"
              onerror="this.onerror=null;this.src='/img/placeholder.jpg';"
            >
          </div>
          <div class="participant-info">
            <div class="participant-name">${p.firstName} ${p.lastName}</div>
            <div class="participant-company">${p.company}</div>
            <div class="participant-role">${p.role}</div>
          </div>
          <div class="toggle-wrapper">
            <span class="toggle-label">Presente</span>
            <div class="toggle-switch">
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </div>
          </div>
        `;

        list.appendChild(card);
      });
    }

    renderParticipants();
  </script>

</body>
</html>
