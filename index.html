<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>RGI Executive Dinner – Check-in</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="header-inner">

      <div class="header-top">
        <div class="header-brand">
          <div class="header-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 118.9">
              <defs><style>.st0{fill:#fff}.st2{fill:#2bace2}</style></defs>
              <path class="st0" d="M221.8,111.5V8.4h19.8v103.1h-19.8Z"/>
              <path class="st0" d="M102.2,67.4c3.2-1.2,6.3-3,9.1-5.4,2.9-2.4,4.9-5.4,6.6-9,1.9-3.6,2.9-7.8,2.9-12.5s-1.4-11-4.2-15.7c-2.5-4.7-6.3-8.5-11.3-11.3-4.9-2.9-13.3-4.8-20.3-5H7.9l9.2,18.8h69.2c4.4,0,8.3,1.4,10.8,3.7,2.5,2.5,3.7,5.9,3.7,9.8s-1.4,7.3-3.7,9.6c-2.5,2.5-6.3,3.7-10.8,3.7h-29.6l8.3,16.7h16.9l21.2,40.6h22l-22.8-44.1h-.1Z"/>
              <path class="st2" d="M38.7,53.1c-2.6-2.6-5.6-3.7-9.1-3.7s-6.5,1.2-9.1,3.7c-2.6,2.6-3.7,5.6-3.7,9.3s1.2,6.5,3.7,9.3c2.6,2.6,5.6,3.7,9.1,3.7s6.5-1.2,9.1-3.7c2.6-2.6,3.7-5.6,3.7-9.3s-1.2-6.5-3.7-9.3"/>
              <path class="st0" d="M158.3,30.7c3.1-3.2,7.3-4.8,12.5-4.8s9.2,1.5,12.2,4.5c3,2.9,4.5,6.5,4.6,10.6h20.3c0-6.1-1.6-11.6-4.7-16.5-3.1-4.9-7.5-8.9-13.1-11.7-5.6-2.9-12.1-4.3-19.4-4.3s-13.9,1.5-19.6,4.4c-5.7,2.9-10.1,7.1-13.2,12.5-3.1,5.4-4.7,11.6-4.7,18.6v32.3c0,7,1.6,13.2,4.7,18.5,3.1,5.3,7.5,9.5,13.2,12.5s12.2,4.5,19.6,4.5,13.9-1.4,19.5-4.2c5.6-2.8,10-6.9,13-12.3,3.1-5.4,4.6-11.7,4.6-19v-22h-36.7v16.5h16.8v8.6c0,4.7-1.5,8.4-4.5,11s-7,4-12,4-9.5-1.6-12.8-4.8c-3.4-3.2-5-7.4-5-12.6v-33.4c0-5.2,1.6-9.4,4.7-12.6v-.3Z"/>
            </svg>
          </div>
          <div class="header-divider"></div>
          <div class="header-title">Executive Dinner</div>
        </div>
        <div class="header-controls">
          <div class="counter-badge"><strong id="presentCount">0</strong>&nbsp;/ <span id="totalCount">0</span></div>
        </div>
      </div>

      <div class="header-bottom">
        <div class="bottom-filters">
          <div class="filter-select-wrap">
            <select id="filterSelect">
              <option value="all">Tutti</option>
              <option value="present">Presenti</option>
              <option value="absent">Non arrivati</option>
            </select>
          </div>
          <div class="sort-group">
            <button class="chip active" data-sort="name">A–Z Nome</button>
            <button class="chip" data-sort="company">A–Z Società</button>
          </div>
        </div>
      </div>

    </div>
  </header>

  <main>
    <div class="participants-list" id="participantsList"></div>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <button class="modal-close" id="modalClose" aria-label="Chiudi">&times;</button>
      <img class="modal-photo" id="modalPhoto" src="" alt=""
           onerror="this.onerror=null;this.src='img/placeholder.jpg';">
      <div class="modal-info" id="modalInfo">
        <div class="modal-name" id="modalName"></div>
        <div class="modal-company" id="modalCompany"></div>
        <div class="modal-role" id="modalRole"></div>
        <div class="modal-experience" id="modalExperienceSection">
          <div class="modal-exp-title">Professional Experience</div>
          <div id="modalExperience"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js" defer></script>

</body>
</html>
